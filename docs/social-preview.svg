<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" aria-label="twparking">
  <title>twparking — Taiwan parking CLI</title>
  <desc>Project social card for twparking.</desc>

  <rect width="1280" height="640" fill="#020617"/>

  <g transform="translate(80 80) scale(0.9375)">
    <rect width="512" height="512" rx="96" fill="#020617"/>
    <rect x="32" y="32" width="448" height="448" rx="32" fill="#0F172A"/>
    <circle cx="72" cy="80" r="12" fill="#FF5F57"/>
    <circle cx="112" cy="80" r="12" fill="#FEBC2E"/>
    <circle cx="152" cy="80" r="12" fill="#28C840"/>
    <line x1="32" y1="128" x2="480" y2="128" stroke="#1E293B" stroke-width="2"/>
    <path d="M 137 232 L 205 304 L 137 376"
